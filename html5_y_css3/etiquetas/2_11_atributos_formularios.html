<!DOCTYPE html>
<html lang="es"> <!-- lenguaje predeterminado de la pagina -->
<head>
    <meta charset="UTF-8"><!-- charset="UTF-8" sirve para que acepte acentos -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>atributos formularios</title><!-- titulo en la pestaña de la pagina -->
</head>
<body>
    <fieldset>
        <legend>formulario</legend>
        <label>usuario:</label>
        <input type="text" required><br><!-- con required hace que aparezca un mensaje para completar el dato -->
        <label>email:</label>
        <input type="email" required><br>
        <input type="password" placeholder="contraseña"><br>
        <input type="number" min="0" step="5"><!-- de a 5 -->
        <button>enviar</button>
    </fieldset>
</body>
</html>
